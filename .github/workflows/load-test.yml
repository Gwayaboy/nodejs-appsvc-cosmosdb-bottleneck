# Load Testing Workflow
# Runs the existing sample-app-test against the deployed application
# Uses OIDC (Federated Identity) for secure Azure authentication

name: Run Load Test

# Controls when the workflow will run
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      testId:
        description: 'Load Test ID to run'
        required: false
        default: 'sample-app-test'
      webappName:
        description: 'Web App Name to test'
        required: false

# Required for OIDC authentication
permissions:
  id-token: write
  contents: read

jobs:
  loadTest:
    name: Run Azure Load Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
          
      - name: Login to Azure using OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          
      - name: Run Load Test
        uses: azure/load-testing@v1
        with:
          loadTestConfigFile: 'SampleApp.yaml'
          loadTestResource: ${{ vars.LOAD_TEST_RESOURCE }}
          resourceGroup: ${{ vars.LOAD_TEST_RESOURCE_GROUP }}
          loadTestId: ${{ github.event.inputs.testId || vars.LOAD_TEST_ID || 'sample-app-test' }}
          env: |
            [
              {
              "name": "webapp",
              "value": "${{ github.event.inputs.webappName || vars.AZURE_WEBAPP_NAME }}.azurewebsites.net"
              }
            ]
      
      - name: Upload Load Test Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: loadTestResults-${{ github.run_number }}
          path: ${{ github.workspace }}/loadTest
          retention-days: 30
          
      - name: Display Test Summary
        if: always()
        run: |
          echo "## Load Test Completed ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test ID:** ${{ github.event.inputs.testId || vars.LOAD_TEST_ID || 'sample-app-test' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ github.event.inputs.webappName || vars.AZURE_WEBAPP_NAME }}.azurewebsites.net" >> $GITHUB_STEP_SUMMARY
          echo "**Load Test Resource:** ${{ vars.LOAD_TEST_RESOURCE }}" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Group:** ${{ vars.LOAD_TEST_RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed results in the Azure Portal:" >> $GITHUB_STEP_SUMMARY
          echo "https://portal.azure.com/#@microsoft.onmicrosoft.com/resource/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ vars.LOAD_TEST_RESOURCE_GROUP }}/providers/Microsoft.LoadTestService/loadtests/${{ vars.LOAD_TEST_RESOURCE }}/overview" >> $GITHUB_STEP_SUMMARY
