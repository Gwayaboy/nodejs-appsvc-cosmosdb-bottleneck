# Load Testing Workflow
# Runs the existing sample-app-test against the deployed application

name: Run Load Test

# Controls when the workflow will run
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      testId:
        description: 'Load Test ID to run'
        required: false
        default: 'sample-app-test'
      webappName:
        description: 'Web App Name to test'
        required: false
        default: 'DemoBottleNeckWebApp'

env:
  AZURE_WEBAPP_NAME: "DemoBottleNeckWebApp"
  LOAD_TEST_RESOURCE: "ALT-Kantar-Demo"
  LOAD_TEST_RESOURCE_GROUP: "kantar-demo-rg"
  SUBSCRIPTION_ID: "518d3b64-280a-4d38-8b93-ea7404fe5ea1"

jobs:
  loadTest:
    name: Run Azure Load Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
          
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          
      - name: Run Load Test
        uses: azure/load-testing@v1
        with:
          loadTestConfigFile: 'SampleApp.yaml'
          loadTestResource: ${{ env.LOAD_TEST_RESOURCE }}
          resourceGroup: ${{ env.LOAD_TEST_RESOURCE_GROUP }}
          loadTestId: ${{ github.event.inputs.testId || 'sample-app-test' }}
          env: |
            [
              {
              "name": "webapp",
              "value": "${{ github.event.inputs.webappName || env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
              }
            ]
      
      - name: Upload Load Test Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: loadTestResults-${{ github.run_number }}
          path: ${{ github.workspace }}/loadTest
          retention-days: 30
          
      - name: Display Test Summary
        if: always()
        run: |
          echo "## Load Test Completed ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test ID:** sample-app-test" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ github.event.inputs.webappName || env.AZURE_WEBAPP_NAME }}.azurewebsites.net" >> $GITHUB_STEP_SUMMARY
          echo "**Load Test Resource:** ${{ env.LOAD_TEST_RESOURCE }}" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Group:** ${{ env.LOAD_TEST_RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed results in the Azure Portal:" >> $GITHUB_STEP_SUMMARY
          echo "https://portal.azure.com/#@microsoft.onmicrosoft.com/resource/subscriptions/${{ env.SUBSCRIPTION_ID }}/resourceGroups/${{ env.LOAD_TEST_RESOURCE_GROUP }}/providers/Microsoft.LoadTestService/loadtests/${{ env.LOAD_TEST_RESOURCE }}/overview" >> $GITHUB_STEP_SUMMARY
